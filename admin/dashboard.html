<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard — ApnaStore Admin</title>
    <link rel="stylesheet" href="admin.css" />
</head>

<body>
    <div class="layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="logo-icon">🛒</div>
                <div>
                    <div class="logo-text">ApnaStore</div>
                    <div class="logo-sub">Admin Panel</div>
                </div>
            </div>
            <nav class="nav-section">
                <div class="nav-section-label">Main</div>
                <a href="dashboard.html" class="nav-item active" id="nav-dashboard">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7" />
                        <rect x="14" y="3" width="7" height="7" />
                        <rect x="3" y="14" width="7" height="7" />
                        <rect x="14" y="14" width="7" height="7" />
                    </svg>
                    Dashboard
                </a>
                <a href="products.html" class="nav-item" id="nav-products">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 7H4a2 2 0 00-2 2v6a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z" />
                        <path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16" />
                    </svg>
                    Products
                </a>
                <a href="orders.html" class="nav-item" id="nav-orders">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2" />
                        <rect x="9" y="3" width="6" height="4" rx="1" />
                        <path d="M9 12h6M9 16h4" />
                    </svg>
                    Orders
                </a>
            </nav>
            <div class="sidebar-footer">
                <button onclick="logout()" class="btn btn-ghost" style="width:100%;justify-content:center;">
                    <svg style="width:16px;height:16px;" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" />
                    </svg>
                    Logout
                </button>
            </div>
        </aside>

        <!-- Main -->
        <div class="main">
            <div class="topbar">
                <div class="topbar-title">Dashboard</div>
                <div class="topbar-right">
                    <a href="http://localhost:3000" target="_blank" class="btn btn-ghost btn-sm">View Store →</a>
                    <div class="admin-badge">
                        <div class="dot"></div><span class="admin-username">admin</span>
                    </div>
                </div>
            </div>

            <div class="page">
                <!-- Stats -->
                <div class="stat-grid" id="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon amber">📦</div>
                        <div>
                            <div class="stat-label">Total Products</div>
                            <div class="stat-value" id="stat-products">—</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon blue">🛍️</div>
                        <div>
                            <div class="stat-label">Total Orders</div>
                            <div class="stat-value" id="stat-orders">—</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon green">💰</div>
                        <div>
                            <div class="stat-label">Total Revenue</div>
                            <div class="stat-value" id="stat-revenue">—</div>
                        </div>
                    </div>
                </div>

                <!-- Recent Orders -->
                <div class="card">
                    <div class="section-header">
                        <div class="section-title">Recent Orders</div>
                        <a href="orders.html" class="btn btn-ghost btn-sm">View All</a>
                    </div>
                    <div class="table-wrap">
                        <table>
                            <thead>
                                <tr>
                                    <th>Order ID</th>
                                    <th>Customer</th>
                                    <th>Amount</th>
                                    <th>Status</th>
                                    <th>Date</th>
                                </tr>
                            </thead>
                            <tbody id="recent-orders-body">
                                <tr>
                                    <td colspan="5" style="text-align:center;padding:32px;color:#64748b;">Loading…</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
    <script>
        (async () => {
            if (!await requireAuth()) return;
            try {
                const r = await apiFetch('/api/admin/stats');
                const d = await r.json();
                document.getElementById('stat-products').textContent = d.totalProducts.toLocaleString();
                document.getElementById('stat-orders').textContent = d.totalOrders.toLocaleString();
                document.getElementById('stat-revenue').textContent = fmtPrice(d.revenue);
                const tbody = document.getElementById('recent-orders-body');
                if (!d.recentOrders.length) {
                    tbody.innerHTML = '<tr><td colspan="5" class="empty"><div class="empty-icon">📭</div><p>No orders yet</p></td></tr>';
                    return;
                }
                tbody.innerHTML = d.recentOrders.map(o => `
      <tr>
        <td><code style="font-size:11px;color:#64748b;">${o._id.slice(-8)}</code></td>
        <td><div style="font-weight:600">${o.user.name}</div><div style="font-size:11px;color:#64748b">${o.user.email}</div></td>
        <td style="font-weight:700;color:#f59e0b">${fmtPrice(o.totalPrice)}</td>
        <td>${statusPill(o.status)}</td>
        <td style="color:#64748b">${fmtDate(o.date)}</td>
      </tr>
    `).join('');
            } catch (e) {
                toast('Failed to load stats', 'error');
            }
        })();
    </script>
</body>

</html>
